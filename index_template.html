<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>游戏圈日报汇总——超哥版</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; background-color: #f0f2f5; margin: 0; padding: 16px; }
        .container { max-width: 800px; margin: 0 auto; }
        .site-header { padding: 20px 10px; text-align: center; }
        .site-header h1 { margin: 0; font-size: 24px; }
        .history-list { display: flex; flex-direction: column; gap: 12px; }
        .history-item { display: flex; align-items: center; background: #fff; padding: 16px; border-radius: 12px; text-decoration: none; color: inherit; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .history-date { font-family: monospace; font-size: 14px; font-weight: bold; color: #1890ff; width: 80px; }
        .history-info { flex: 1; }
        .history-title { font-size: 16px; font-weight: 500; }
        .history-count { font-size: 12px; color: #909399; margin-left: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="site-header">
        <h1>📚 往期游戏圈日报</h1>
        <p>沉淀行业资讯，随时回顾</p>
    </div>
    <div class="history-list">
        </div>
</div>
</body>
</html>
