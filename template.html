<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>{{DATE}}游戏圈日报——超哥版</title>
    <meta property="og:title" content="{{DATE}}游戏圈日报——超哥版">
    <meta property="og:description" content="共收录 {{COUNT}} 篇昨日头条 · 点击查看完整日报">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root { --bg-color: #f0f2f5; --text-main: #1a1a1a; --text-light: #5c6b77; --text-meta: #909399; --card-bg: #ffffff; --tag-chuhai: #e6f7ff; --tag-chuhai-text: #1890ff; --tag-ai: #f6ffed; --tag-ai-text: #52c41a; --tag-hangye: #fff0f6; --tag-hangye-text: #eb2f96; --tag-xiaoyouxi: #fff7e6; --tag-xiaoyouxi-text: #fa8c16; --tag-featured: #fffbe6; --tag-featured-text: #faad14; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); -webkit-tap-highlight-color: transparent; }
        .container { max-width: 800px; margin: 0 auto; padding: 10px; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .back-link { color: #1890ff; text-decoration: none; font-size: 14px; font-weight: 500; }
        .btn-poster { background: #1890ff; color: #fff; border: none; border-radius: 6px; padding: 6px 12px; font-size: 13px; font-weight: 500; cursor: pointer; }
        .header { padding: 0 10px 16px; text-align: left; }
        .header h1 { margin: 0; font-size: 20px; font-weight: 600; }
        .header p { margin: 4px 0 0; color: var(--text-meta); font-size: 12px; }
        .article-list { display: flex; flex-direction: column; gap: 8px; }
        .card { background: var(--card-bg); border-radius: 8px; padding: 14px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
        .card.featured { background: #fffefa; border: 1px solid #faedcd; }
        .title { margin: 0 0 6px 0; font-size: 16px; line-height: 1.45; font-weight: 500; }
        .title a { color: var(--text-main); text-decoration: none; position: relative; z-index: 2; }
        .title a::after { content: ''; position: absolute; top: -14px; right: -14px; bottom: -14px; left: -14px; z-index: 1; }
        .summary { font-size: 13px; color: var(--text-light); line-height: 1.5; margin: 0 0 8px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .meta { display: flex; align-items: center; font-size: 11px; color: var(--text-meta); }
        .tag { padding: 2px 6px; border-radius: 4px; margin-right: 8px; font-weight: 500; background: #eee; }
        .tag.featured-tag { background: var(--tag-featured); color: var(--tag-featured-text); }
        .source { font-weight: 500; margin-right: 8px; color: #8c8c8c; }
        .time { margin-left: auto; color: #bfbfbf; font-size: 10px; }
    </style>
</head>
<body>
<div class="container" id="capture-area">
    <div class="top-nav" id="hide-in-poster">
        <a href="index.html" class="back-link">← 返回历史</a>
        <button id="posterBtn" class="btn-poster" onclick="generatePoster()">生成长图海报</button>
    </div>
    <div class="header">
        <h1>🎮 {{DATE}}游戏圈日报——超哥版</h1>
        <p>共收录 {{COUNT}} 篇昨日头条 · 点击卡片直接阅读</p>
    </div>
    <div class="article-list">
        </div>
</div>
<script>
    function generatePoster() {
        const btn = document.getElementById('posterBtn');
        const hideArea = document.getElementById('hide-in-poster');
        const container = document.getElementById('capture-area');
        btn.innerText = '正在生成...';
        hideArea.style.opacity = '0';
        html2canvas(container, { scale: 2, useCORS: true, backgroundColor: '#f0f2f5' }).then(canvas => {
            hideArea.style.opacity = '1';
            btn.innerText = '生成长图海报';
            const imgData = canvas.toDataURL('image/png');
            const overlay = document.createElement('div');
            overlay.style = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;";
            overlay.innerHTML = `<div style="color:#fff;margin-bottom:10px">🎉 长按图片保存</div><img src="${imgData}" style="max-width:90%;max-height:80%;border-radius:8px;">`;
            overlay.onclick = () => document.body.removeChild(overlay);
            document.body.appendChild(overlay);
        });
    }
</script>
</body>
</html>
